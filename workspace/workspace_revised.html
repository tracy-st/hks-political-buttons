<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Workspace</title>
  <link rel="stylesheet" href="workspace_style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
 <div id="workspaceColumns" class="content-with-sidebars">
  
     <div id="workspaceContainer" class="sticky">
      <h2>Workspace</h2>
      <div class="workspace" id="workspace"> 
        <!-- workspaceInner is the logical canvas: fixed logical size so text and cards share coordinates -->
        <div id="workspaceInner" style="position:relative; width:1200px; height:800px; overflow:visible;">
          <!-- background layer (letters) — absolutely positioned in logical coords -->
          <div id="workspaceBackground" style="position:absolute; left:0; top:0; width:1200px; height:800px; pointer-events:none;">
            <span id="workspaceLabel" style="position:absolute; left:200px; top:120px; font-size:220px; line-height:1; font-weight:700;">HKS</span>
          </div>
        </div>
      </div>
    </div>
     <div id="sidebar" class="sticky">
       <div class="right-controls">
          <button id="toggleTopBar">Collapse sidebar</button>
      </div>
      <div class="sidebar">
          <div class="options">
            <h2>Filter by Color (primary)</h2>
            <div class="filters" id="filters"></div>
            <div class="color-filters">
              <label>Primary Color: <input type="color" id="colorPicker" value="#ff0000"></label><br>
              <label style="display:block; margin-top:6px;">Tolerance: <input type="range" id="tolerance" min="0" max="255" value="60"><span id="tolValue">60</span></label><br>
              <label style="display:block; margin-top:6px;">Color Name: <input id="colorNameFilter" placeholder="e.g. red"></label><br>
              <label style="display:block; margin-top:6px;">Search Hex: <input id="searchHex" placeholder="#rrggbb"></label>
              <div>
                <button id="clearFilters">Clear</button>
              </div>
            </div>
          </div>
          <div class="options">
            <h2>Search Titles</h2>
            <input id="search" placeholder="Search titles..." class="search-bar">
          </div>
          <div class="view-bar">
              <button id="viewList">View Workspace as List</button>
              <button id="workspaceFullscreenBtn">View Workspace Full Screen</button>
              <button id="instructionsBtn">Instructions</button>
          </div>
      </div>
      
    </div>
    <div id="gridContainer">
      <div class="image-grid" id="imageGrid"></div>
    </div>
  </div>
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; max-height:80%; overflow:auto; max-width:80%;">
      <h3>Workspace Items</h3>
      <table id="workspaceTable" style="width:100%;">
        <thead><tr><th>Thumbnail</th><th>Title</th><th>ID</th></tr></thead>
        <tbody></tbody>
      </table>
      <button id="downloadCSV" style="margin-top: 10px; padding: 5px 10px;">Download CSV</button>
      <button id="closeModal" style="margin-top: 10px; padding: 5px 10px;">Close</button>
    </div>
  </div>

  <div id="instructionsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; max-height:80%; overflow:auto; max-width:80%;">
      <div id="instructionsText"></div>
      <button id="closeInstructionsModal" style="margin-top:10px;">Close</button>
    </div>
  </div>

  <div id="imageModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1001;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; max-height:80%; overflow:auto; max-width:80%;">
      <img id="modalImg" style="max-width:100%; height:auto; display:block; margin-bottom:10px;">
      <div id="modalColors"></div>
      <button id="closeImageModal" style="margin-top:10px;">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const imageGrid = document.getElementById('imageGrid');
    const workspace = document.getElementById('workspace');
    const wsInner = document.getElementById('workspaceInner');
    let data = [];
    let searchTerm = '';
    let workspaceItems = [];

    // logical pan/zoom state
    let zoom = 1;
    let panX = 0; // logical units
    let panY = 0;
    function clamp(v,a,b){ return Math.min(Math.max(v,a),b); }

    if(wsInner) wsInner.style.transformOrigin = '0 0';
    function applyTransform(){
      if(!wsInner) return;
      // translate takes pixels; panX/panY are logical units so convert by *zoom
      wsInner.style.transform = `translate(${panX * zoom}px, ${panY * zoom}px) scale(${zoom})`;
    }

    function screenToLogical(clientX, clientY){
      const rect = workspace.getBoundingClientRect();
      const sx = (clientX - rect.left) / zoom;
      const sy = (clientY - rect.top) / zoom;
      return { lx: sx - panX, ly: sy - panY };
    }

    function logicalToScreen(lx, ly){
      const rect = workspace.getBoundingClientRect();
      const sx = (lx + panX) * zoom + rect.left;
      const sy = (ly + panY) * zoom + rect.top;
      return { sx, sy };
    }

    // UI hooks (minimal)
    const searchInput = document.getElementById('search');
    if(searchInput) searchInput.addEventListener('input', (e)=>{ searchTerm = e.target.value.toLowerCase(); renderImages(); });

    async function loadCSV(){
      const resp = await fetch('../data/pylette_metadata.csv');
      const text = await resp.text();
      const parsed = Papa.parse(text,{ header:true, skipEmptyLines:true });
      const byImage = {};
      parsed.data.forEach(row=>{
        const img = (row.image_url||'').trim(); if(!img) return;
        if(!byImage[img]) byImage[img] = { image_url: img, id: row.filename||'', w_cm: row.w_cm||'', title: row.name||'', raw: [] };
        byImage[img].raw.push({ color: row.hex, proportion: row.frequency, title: row.name, filename: row.filename });
      });
      data = Object.keys(byImage).map((k,idx)=>{
        const g = byImage[k]; g.raw.sort((a,b)=> (parseFloat(b.proportion)||0) - (parseFloat(a.proportion)||0));
        const colors = g.raw.map(rr=>({ hex: (rr.color||''), proportion: parseFloat(rr.proportion)||0 })).filter(c=>c.hex);
        return { id: g.id||`img-${idx}`, name: g.title||`Image ${idx+1}`, width: parseFloat(g.w_cm)||3, url: g.image_url, colors, raw:g.raw };
      });
      renderImages();
    }

    function renderImages(){
      const cf = window._colorFilter || {};
      let images = data.filter(i => { if(searchTerm && !(i.name||'').toLowerCase().includes(searchTerm)) return false; if(!cf.clr && !cf.searchHex && !cf.colorName) return true; if(cf.searchHex){ let best=0; i.colors.forEach(c=>{ if(colorDistance(hexToRgb(c.hex), hexToRgb(cf.searchHex))<=24) best = Math.max(best,c.proportion); }); return best>0; } if(cf.clr){ let best=0; i.colors.forEach(c=>{ if(colorDistance(hexToRgb(c.hex), hexToRgb(cf.clr))<=cf.tol) best = Math.max(best,c.proportion); }); return best>0; } if(cf.colorName){ let best=0; i.colors.forEach(c=>{ if(colorNameFromHex(c.hex)===cf.colorName) best = Math.max(best,c.proportion); }); return best>0; } return true; });
      imageGrid.innerHTML = '';
      images.forEach(img=>{
        const card = document.createElement('div'); card.className='image-card'; card.draggable=true; card.ondragstart=(e)=>e.dataTransfer.setData('id',img.id); card.onclick=()=> addToWorkspace(img, 100,100);
        const imgEl = document.createElement('img'); imgEl.src = img.url; imgEl.alt = img.name; card.appendChild(imgEl);
        const nameDiv = document.createElement('div'); nameDiv.textContent = img.name; nameDiv.style.marginTop='6px'; card.appendChild(nameDiv);
        imageGrid.appendChild(card);
      });
    }

    // color helpers
    function normalizeHex(h){ if(!h) return ''; h=h.trim(); if(h[0] !== '#') h='#'+h; if(h.length===4) h='#'+h[1]+h[1]+h[2]+h[2]+h[3]+h[3]; return h.toLowerCase(); }
    function hexToRgb(hex){ if(!hex) return {r:0,g:0,b:0}; hex=hex.replace('#',''); if(hex.length===3) hex=hex.split('').map(ch=>ch+ch).join(''); const n=parseInt(hex,16); return {r:(n>>16)&255, g:(n>>8)&255, b:n&255}; }
    function colorDistance(a,b){ const dr=a.r-b.r, dg=a.g-b.g, db=a.b-b.b; return Math.sqrt(dr*dr+dg*dg+db*db); }
    function rgbToHsl(r,g,b){ r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b); let h=0,s=0,l=(max+min)/2; if(max!==min){ const d=max-min; s = l>0.5?d/(2-max-min):d/(max+min); switch(max){ case r: h=(g-b)/d + (g<b?6:0); break; case g: h=(b-r)/d + 2; break; case b: h=(r-g)/d + 4; break; } h/=6; } return {h:h*360,s,l}; }
    function colorNameFromHex(hex){ const {r,g,b}=hexToRgb(hex); const hsl=rgbToHsl(r,g,b); const h=hsl.h,l=hsl.l,s=hsl.s; if(l<0.12) return 'black'; if(l>0.92) return 'white'; if(s<0.12) return 'gray'; if(h>=345||h<15) return 'red'; if(h>=15&&h<45) return 'orange'; if(h>=45&&h<75) return 'yellow'; if(h>=75&&h<165) return 'green'; if(h>=165&&h<195) return 'cyan'; if(h>=195&&h<255) return 'blue'; if(h>=255&&h<285) return 'purple'; if(h>=285&&h<330) return 'magenta'; return 'pink'; }

    // addToWorkspace uses logical coords
    function addToWorkspace(img, x=50, y=50){
      const host = wsInner || workspace; if([...host.children].some(el=>el.dataset.id===img.id)) return;
      const div = document.createElement('div'); div.className='workspace-card'; div.dataset.id=img.id; div.style.position='absolute'; div.style.left = x + 'px'; div.style.top = y + 'px'; div.innerHTML = `<img src="${img.url}" alt="${img.name}" style="width:${img.width*5}px">`;
      let offsetX=0, offsetY=0, isDragging=false;
      div.addEventListener('mousedown',(e)=>{ e.stopPropagation(); isDragging=true; const logical = screenToLogical(e.clientX, e.clientY); const curLeft=parseFloat(div.style.left||0); const curTop=parseFloat(div.style.top||0); offsetX = logical.lx - curLeft; offsetY = logical.ly - curTop; div.style.zIndex=1000; });
      const onMove = (e)=>{ if(!isDragging) return; const logical = screenToLogical(e.clientX, e.clientY); const nx = logical.lx - offsetX; const ny = logical.ly - offsetY; div.style.left = nx + 'px'; div.style.top = ny + 'px'; };
      const onUp = (e)=>{ if(isDragging){ const rect = workspace.getBoundingClientRect(); if(e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom){ if(div.parentNode) div.parentNode.removeChild(div); const idx = workspaceItems.findIndex(it=>it.id===div.dataset.id); if(idx>-1) workspaceItems.splice(idx,1); } } isDragging=false; div.style.zIndex=''; };
      document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
      host.appendChild(div); workspaceItems.push({ id: img.id, name: img.name, url: img.url });
    }

    // drag/drop onto workspace
    workspace.addEventListener('dragover',(e)=>e.preventDefault());
    workspace.addEventListener('drop',(e)=>{ e.preventDefault(); const id = e.dataTransfer.getData('id'); const img = data.find(i=>i.id===id); if(img){ const logical = screenToLogical(e.clientX, e.clientY); addToWorkspace(img, logical.lx, logical.ly); } });

    // panning
    let isPanning=false, panLastX=0, panLastY=0;
    workspace.addEventListener('mousedown',(e)=>{ if(e.target.closest('.workspace-card')) return; isPanning=true; panLastX=e.clientX; panLastY=e.clientY; e.preventDefault(); });
    document.addEventListener('mousemove',(e)=>{ if(!isPanning) return; const deltaX = e.clientX - panLastX; const deltaY = e.clientY - panLastY; panX += deltaX / zoom; panY += deltaY / zoom; applyTransform(); panLastX = e.clientX; panLastY = e.clientY; });
    document.addEventListener('mouseup',()=>{ isPanning=false; });

    // wheel zoom around cursor
    workspace.addEventListener('wheel',(e)=>{ e.preventDefault(); const mouse = screenToLogical(e.clientX, e.clientY); const mx = mouse.lx, my = mouse.ly; const delta = e.deltaY>0 ? -0.1 : 0.1; const newZoom = clamp(zoom + delta, 0.5, 3); if(newZoom===zoom) return; panX = (mx + panX) * (zoom / newZoom) - mx; panY = (my + panY) * (zoom / newZoom) - my; zoom = newZoom; applyTransform(); });

    loadCSV();
    applyTransform();
  </script>


</body>
</html>
