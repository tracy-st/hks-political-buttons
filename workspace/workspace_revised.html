<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Workspace</title>
  <link rel="stylesheet" href="workspace_style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
 <div id="workspaceColumns" class="content-with-sidebars">
  
     <div id="workspaceContainer" class="sticky">
      <div class="right-controls">
          <button id="toggleTopBar">Collapse sidebar</button>
               <h2>Workspace</h2>
      </div>

      <div class="workspace" id="workspace"> 
        <!-- workspaceInner is the logical canvas: fixed logical size so text and cards share coordinates -->
        <div id="workspaceInner" style="position:relative; width:1200px; height:800px; overflow:visible;">
          <!-- background layer (letters) — absolutely positioned in logical coords -->
          <div id="workspaceBackground" style="position:absolute; left:0; top:0; width:1200px; height:800px; pointer-events:none;">
            <span id="workspaceLabel">HKS</span>
          </div>
        </div>
      </div>
    </div>
     <div id="sidebar" class="sticky">
      <div class="sidebar">
          <div class="options">
            <h2>Filter by Color</h2>
            <div class="filters" id="filters"></div>
            <div class="color-filters">
              <label>Primary Color: <input type="color" id="colorPicker" value="#ff0000"></label><br>
               <label style="display:block; margin-top:6px;">Search Hex: <input id="searchHex" placeholder="#rrggbb"></label>
             
              <label style="display:block; margin-top:6px;">Tolerance: <input type="range" id="tolerance" min="0" max="255" value="60"><span id="tolValue">60</span></label><br>
              
                <!-- removed Color Name filter -->
              <div>
                <button id="clearFilters">Clear</button>
              </div>
            </div>
          </div>
          <div class="options">
            <h2>Show only:</h2>
            <div class="decade-filters" id="decadeFilters"></div>
            <div>
              <button id="selectAllDecades">Select All</button>
              <button id="deselectAllDecades">Deselect All</button>
            </div>
          </div>
          <div class="options">
            <h2>Filter by Metadata</h2>
            <div class="metadata-filters">
              <label>Person: <select id="personFilter"></select></label><br>
              <label>Party: <select id="partyFilter"></select></label><br>
              <label>Location: <select id="locationFilter"></select></label><br>
            </div>
          </div>
          <div class="options">
            <h2>Search Titles</h2>
            <input id="search" placeholder="Search titles..." class="search-bar">
          </div>
          <div class="view-bar">
              <button id="viewList">View Workspace as List</button>
              <button id="workspaceFullscreenBtn">View Workspace Full Screen</button>
              <button id="instructionsBtn">Instructions</button>
          </div>
      </div>
      
    </div>
    <div id="gridContainer">
      <div id="resultCount" style="padding:10px; font-size:14px; color:#666; font-weight:500;"></div>
      <div class="image-grid" id="imageGrid"></div>
    </div>
  </div>
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; max-height:80%; overflow:auto; max-width:80%;">
      <h3>Workspace Items</h3>
      <table id="workspaceTable" style="width:100%;">
        <thead><tr><th>Thumbnail</th><th>Title</th><th>ID</th></tr></thead>
        <tbody></tbody>
      </table>
      <button id="downloadCSV" style="margin-top: 10px; padding: 5px 10px;">Download CSV</button>
      <button id="closeModal" style="margin-top: 10px; padding: 5px 10px;">Close</button>
    </div>
  </div>

  <div id="instructionsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; max-height:80%; overflow:auto; max-width:80%;">
      <div id="instructionsText"></div>
      <button id="closeInstructionsModal" style="margin-top:10px;">Close</button>
    </div>
  </div>

  <div id="imageModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1001;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; max-height:80%; overflow:auto; max-width:80%;">
      <img id="modalImg" style="max-width:100%; height:auto; display:block; margin-bottom:10px;">
      <div id="modalColors"></div>
      <button id="closeImageModal" style="margin-top:10px;">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
   const imageGrid = document.getElementById('imageGrid');
    const workspace = document.getElementById('workspace');
    const wsInner = document.getElementById('workspaceInner');
    const searchInput = document.getElementById('search');
    const colorPickerEl = document.getElementById('colorPicker');
    const tolEl = document.getElementById('tolerance');
    const searchHexEl = document.getElementById('searchHex');
    const clearFiltersBtn = document.getElementById('clearFilters');

    let data = [];
    let workspaceItems = [];

    // --- 1. SINGLE INITIAL STATE OBJECT ---
    const defaultState = {
      searchTerm: '',
      colorFilter: {
        clr: '#272221',
        tol: 60,
        searchHex: ''
      },
      selectedDecades: [],
      metadata: {
        person: 'All',
        party: 'All',
        location: 'All'
      }
    };

    let currentState = JSON.parse(JSON.stringify(defaultState));

    // --- 2. SYNC UI WITH STATE ---
    function syncUIWithState() {
      if (searchInput) searchInput.value = currentState.searchTerm;
      if (searchHexEl) searchHexEl.value = currentState.colorFilter.searchHex;
      
      if (colorPickerEl) colorPickerEl.value = currentState.colorFilter.clr;
      if (tolEl) {
        tolEl.value = currentState.colorFilter.tol;
        const label = document.getElementById('tolValue');
        if (label) label.textContent = currentState.colorFilter.tol;
      }

      document.querySelectorAll('#decadeFilters input').forEach(cb => {
        cb.checked = currentState.selectedDecades.includes(parseInt(cb.value));
      });

      ['person', 'party', 'location'].forEach(field => {
        const el = document.getElementById(field + 'Filter');
        if (el) el.value = currentState.metadata[field];
      });

      // Sync the internal global used by color logic
      window._colorFilter = { 
        clr: currentState.colorFilter.clr, 
        tol: currentState.colorFilter.tol, 
        searchHex: currentState.colorFilter.searchHex 
      };
    }

    // logical pan/zoom state
    let zoom = 1;
    let panX = 0; 
    let panY = 0;
    function clamp(v,a,b){ return Math.min(Math.max(v,a),b); }

    if(wsInner) wsInner.style.transformOrigin = '0 0';
    function applyTransform(){
      if(!wsInner) return;
      wsInner.style.transform = `translate(${panX * zoom}px, ${panY * zoom}px) scale(${zoom})`;
    }

    function screenToLogical(clientX, clientY){
      const rect = workspace.getBoundingClientRect();
      const sx = (clientX - rect.left) / zoom;
      const sy = (clientY - rect.top) / zoom;
      return { lx: sx - panX, ly: sy - panY };
    }

    // --- 3. UPDATED RENDER IMAGES ---
    function renderImages(){
      const cf = window._colorFilter || {};
      
      let images = data.filter(i => {
        // Title Search
        if(currentState.searchTerm && !(i.name||'').toLowerCase().includes(currentState.searchTerm)) return false;
        
        // Decade Filter
        if(currentState.selectedDecades.length > 0){
          const date = i.earliest_date;
          if(date && /^\d{4}$/.test(date)){
            const year = parseInt(date);
            const decade = Math.floor(year / 10) * 10;
            if(!currentState.selectedDecades.includes(decade)) return false;
          } else {
            return false;
          }
        }
        
        // Metadata Filters
        if(currentState.metadata.person !== 'All' && (i.person || 'N/A') !== currentState.metadata.person) return false;
        if(currentState.metadata.party !== 'All' && (i.party || 'N/A') !== currentState.metadata.party) return false;
        if(currentState.metadata.location !== 'All' && (i.location || 'N/A') !== currentState.metadata.location) return false;
        
        // Color Filters
        if(!cf.clr && !cf.searchHex) return true;

        if(cf.searchHex){
          let best = 0;
          i.colors.forEach(c => {
            if(colorDistance(hexToRgb(c.hex), hexToRgb(cf.searchHex)) <= 24) best = Math.max(best, c.proportion);
          });
          return best > 0;
        }

        if(cf.clr){
          let best = 0;
          i.colors.forEach(c => {
            if(colorDistance(hexToRgb(c.hex), hexToRgb(cf.clr)) <= cf.tol) best = Math.max(best, c.proportion);
          });
          return best > 0;
        }

        return true;
      });

      // Sorting
      if(cf.clr || cf.searchHex){
        images.sort((a,b)=>{
          const score = (img)=>{
            let best=0;
            img.colors.forEach(c=>{
              const dist = cf.searchHex ? colorDistance(hexToRgb(c.hex), hexToRgb(cf.searchHex)) : colorDistance(hexToRgb(c.hex), hexToRgb(cf.clr));
              const tol = cf.searchHex ? 24 : cf.tol;
              if(dist <= tol) best = Math.max(best, c.proportion);
            });
            return best;
          };
          return score(b) - score(a);
        });
      }

      // Update decade counts and grid
      imageGrid.innerHTML = '';
      const countEl = document.getElementById('resultCount');
      if(countEl) countEl.textContent = `${images.length} / ${data.length} results`;

      images.forEach(img => {
        const card = document.createElement('div');
        card.className = 'image-card';
        card.draggable = true;
        card.ondragstart = (e) => e.dataTransfer.setData('id', img.id);
        card.onclick = () => addToWorkspace(img, 100, 100);
        
        const imgEl = document.createElement('img'); 
        imgEl.src = img.url; 
        imgEl.alt = img.name; 
        card.appendChild(imgEl);

      // swatches row
        const swatchesDiv = document.createElement('div');
        swatchesDiv.className = 'swatches';
        img.colors.slice(0,5).forEach(c => {
          const s = document.createElement('span');
          s.style.display = 'inline-block';
          s.style.width = '18px';
          s.style.height = '18px';
          s.style.background = c.hex;
          s.style.marginRight = '6px';
          s.style.border = '1px solid #fff';
          s.title = `${c.hex} — ${Math.round(c.proportion*100)}%`;
          swatchesDiv.appendChild(s);
        });
        card.appendChild(swatchesDiv);

        const nameDiv = document.createElement('div'); 
        nameDiv.textContent = img.name; 
        nameDiv.style.marginTop = '6px';
        nameDiv.addEventListener('click', (e)=>{ e.stopPropagation(); openModal(img.id); });
        card.appendChild(nameDiv);
        imageGrid.appendChild(card);
      });
    }

    // --- 4. EVENT LISTENERS UPDATED FOR STATE ---
    if(searchInput) {
      searchInput.addEventListener('input', (e) => { 
        currentState.searchTerm = e.target.value.toLowerCase(); 
        renderImages(); 
      });
    }

    if(colorPickerEl) {
      colorPickerEl.addEventListener('input', (e) => {
        currentState.colorFilter.clr = normalizeHex(e.target.value);
        syncUIWithState();
        renderImages();
      });
    }

    if(tolEl) {
      tolEl.addEventListener('input', (e) => {
        currentState.colorFilter.tol = parseInt(e.target.value);
        syncUIWithState();
        renderImages();
      });
    }

    if(searchHexEl) {
      searchHexEl.addEventListener('input', (e) => {
        currentState.colorFilter.searchHex = normalizeHex(e.target.value);
        syncUIWithState();
        renderImages();
      });
    }

    // --- THE FIX: CLEAR BUTTON ---
    if(clearFiltersBtn) {
      clearFiltersBtn.addEventListener('click', () => {
        currentState = JSON.parse(JSON.stringify(defaultState));
        syncUIWithState();
        renderImages();
      });
    }

    const selectAllDecadesBtn = document.getElementById('selectAllDecades');
    if(selectAllDecadesBtn) {
      selectAllDecadesBtn.addEventListener('click', () => {
        const allDecades = Array.from(document.querySelectorAll('#decadeFilters input')).map(cb => parseInt(cb.value));
        currentState.selectedDecades = allDecades;
        syncUIWithState();
        renderImages();
      });
    }

    const deselectAllDecadesBtn = document.getElementById('deselectAllDecades');
    if(deselectAllDecadesBtn) {
      deselectAllDecadesBtn.addEventListener('click', () => {
        currentState.selectedDecades = [];
        syncUIWithState();
        renderImages();
      });
    }

    // CSV Loading and Data Parsing
    async function loadCSV(){
      try {
        let resp = await fetch('./data/hks_buttons_color_metadata.csv');
        if(!resp.ok) resp = await fetch('../data/hks_buttons_color_metadata.csv');
        if(!resp.ok) return;
        const text = await resp.text();
        const parsed = Papa.parse(text,{ header:true, skipEmptyLines:true });
        const byImage = {};
        const uniqueValues = { person: new Set(), party: new Set(), location: new Set() };
        
        parsed.data.forEach(row=>{
          const iiifId = (row.iiifid||'').trim(); if(!iiifId) return;
          if(!byImage[iiifId]) byImage[iiifId] = { iiifId, id: iiifId, w_cm: row.wcm||'', title: row.name||'', earliest_date: row.earliest_date||'', person: row.person||'', party: row.party||'', location: row.location||'', raw: [] };
          byImage[iiifId].raw.push({ color: row.Hex, proportion: row.frequency });
          ['person', 'party', 'location'].forEach(field => uniqueValues[field].add(row[field] || 'N/A'));
        });

        data = Object.keys(byImage).map((k,idx)=>{
          const g = byImage[k];
          const colors = g.raw.map(rr=>({ hex: (rr.color||''), proportion: parseFloat(rr.proportion)||0 })).filter(c=>c.hex);
          return { id: g.id, name: g.title, width: parseFloat(g.w_cm)||3, iiifId: g.iiifId, url: buildIIIFUrl(g.iiifId), colors, earliest_date: g.earliest_date, person: g.person, party: g.party, location: g.location };
        });

        renderDecadeFilters();
        renderMetadataFilters(uniqueValues);
        syncUIWithState();
        renderImages();
      } catch(err) { console.error('Error loading CSV:', err); }
    }

    function renderDecadeFilters(){
      const container = document.getElementById('decadeFilters');
      if(!container) return;
      const decadeCounts = {};
      data.forEach(img => {
        const year = parseInt(img.earliest_date);
        if(year) {
          const d = Math.floor(year / 10) * 10;
          decadeCounts[d] = (decadeCounts[d] || 0) + 1;
        }
      });
      container.innerHTML = '';
      Object.keys(decadeCounts).sort().forEach(decade => {
        const label = document.createElement('label');
        label.style.display = 'block';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = decade;
        cb.addEventListener('change', (e) => {
          const val = parseInt(e.target.value);
          if(e.target.checked) currentState.selectedDecades.push(val);
          else currentState.selectedDecades = currentState.selectedDecades.filter(d => d !== val);
          renderImages();
        });
        label.appendChild(cb);
        label.appendChild(document.createTextNode(` ${decade}s (${decadeCounts[decade]})`));
        container.appendChild(label);
      });
    }

    function renderMetadataFilters(uniqueValues){
      ['person', 'party', 'location'].forEach(field => {
        const select = document.getElementById(field + 'Filter');
        if(!select) return;
        select.innerHTML = '<option value="All">All</option>';
        Array.from(uniqueValues[field]).sort().forEach(val => {
          const opt = document.createElement('option');
          opt.value = val; opt.textContent = val;
          select.appendChild(opt);
        });
        select.addEventListener('change', (e) => {
          currentState.metadata[field] = e.target.value;
          renderImages();
        });
      });
    }

    // Helper functions (IIIF, Colors, Modals, Workspace) remain as they were...
    function buildIIIFUrl(id){ return `https://iiif-cache.digitalhumanities.fas.harvard.edu/iiif/thumb?url=https://ids.lib.harvard.edu/ids/iiif/${id}/full/,300/0/default.jpg`; }
    function normalizeHex(h){ if(!h) return ''; h=h.trim(); if(h[0] !== '#') h='#'+h; return h.toLowerCase(); }
    function hexToRgb(hex){ hex=hex.replace('#',''); if(hex.length===3) hex=hex.split('').map(ch=>ch+ch).join(''); const n=parseInt(hex,16); return {r:(n>>16)&255, g:(n>>8)&255, b:n&255}; }
    function colorDistance(a,b){ return Math.sqrt(Math.pow(a.r-b.r,2)+Math.pow(a.g-b.g,2)+Math.pow(a.b-b.b,2)); }

    function openModal(id){
      const img = data.find(i => i.id === id);
      if(!img) return;
      document.getElementById('modalImg').src = img.url;
      const colorsDiv = document.getElementById('modalColors');
      colorsDiv.innerHTML = `<strong>Title:</strong> ${img.name}<br><strong>Date:</strong> ${img.earliest_date}<br><br>`;
      img.colors.forEach(c => {
        colorsDiv.innerHTML += `<div style="margin-bottom:4px;"><span style="display:inline-block;width:20px;height:20px;background:${c.hex};border:1px solid #000;vertical-align:middle;margin-right:8px;"></span>${c.hex} - ${Math.round(c.proportion*100)}%</div>`;
      });
      document.getElementById('imageModal').style.display = 'block';
    }

    function addToWorkspace(img, x=50, y=50){
      if([...(wsInner||workspace).children].some(el=>el.dataset.id===img.id)) return;
      const div = document.createElement('div');
      div.className='workspace-card'; div.dataset.id=img.id; div.style.position='absolute'; div.style.left = x + 'px'; div.style.top = y + 'px';
      div.innerHTML = `<img src="${img.url}" style="width:${img.width*5}px">`;
      
      let isDragging=false, offsetX=0, offsetY=0;
      div.addEventListener('mousedown',(e)=>{
        e.stopPropagation(); isDragging=true;
        const logical = screenToLogical(e.clientX, e.clientY);
        offsetX = logical.lx - parseFloat(div.style.left);
        offsetY = logical.ly - parseFloat(div.style.top);
        div.style.zIndex=1000;
      });
      document.addEventListener('mousemove',(e)=>{
        if(!isDragging) return;
        const logical = screenToLogical(e.clientX, e.clientY);
        div.style.left = (logical.lx - offsetX) + 'px';
        div.style.top = (logical.ly - offsetY) + 'px';
      });
      document.addEventListener('mouseup',()=>{ isDragging=false; div.style.zIndex=''; });
      
      (wsInner||workspace).appendChild(div);
      workspaceItems.push({ id: img.id, name: img.name, url: img.url });
    }

    // Panning & Zooming
    workspace.addEventListener('mousedown',(e)=>{ if(e.target.closest('.workspace-card')) return; isPanning=true; panLastX=e.clientX; panLastY=e.clientY; });
    document.addEventListener('mousemove',(e)=>{ if(!isPanning) return; panX += (e.clientX - panLastX)/zoom; panY += (e.clientY - panLastY)/zoom; applyTransform(); panLastX=e.clientX; panLastY=e.clientY; });
    document.addEventListener('mouseup',()=>{ isPanning=false; });
    workspace.addEventListener('wheel',(e)=>{ e.preventDefault(); const mouse = screenToLogical(e.clientX, e.clientY); const delta = e.deltaY>0 ? -0.1 : 0.1; const newZoom = clamp(zoom + delta, 0.5, 3); panX = (mouse.lx + panX) * (zoom / newZoom) - mouse.lx; panY = (mouse.ly + panY) * (zoom / newZoom) - mouse.ly; zoom = newZoom; applyTransform(); });

    // Modals & UI Toggles
    const instructionsBtn = document.getElementById('instructionsBtn');
    if(instructionsBtn) instructionsBtn.addEventListener('click', () => document.getElementById('instructionsModal').style.display = 'block');
    document.getElementById('closeInstructionsModal').addEventListener('click', () => document.getElementById('instructionsModal').style.display = 'none');
    document.getElementById('closeImageModal').addEventListener('click', () => document.getElementById('imageModal').style.display = 'none');

    loadCSV();
    applyTransform();
  </script>


</body>
</html>
